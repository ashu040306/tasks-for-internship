              <style id="vega-embed-style">.vega-embed {
  position: relative;

}

  list-style: none;
  position: absolute;
  top: 0;
  right: 0;
  padding: 6px;
  z-index: 1000;
  background: white;
  box-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
  color: #1b1e23;

  opacity: 0.2;
  transition: opacity 0.4s ease-in;
  cursor: pointer;
  line-height: 0px;
}

  display: none;
}

  box-shadow: #aaa 0px 0px 0px 1px inset;
}

  width: 14px;
  height: 14px;
}
.vega-embed details[open] summary {
  opacity: 0.7;
}
.vega-embed:hover summary, .vega-embed:focus-within summary {
  opacity: 1 !important;
  transition: opacity 0.2s ease;
}
.vega-embed .vega-actions {

                async function handleGenerateVegaPng(requestPort) {
                  try {
                    const view = await currentVegaViewPromise;
                    if (!view) {
                      throw new Error('Cannot generate image: Vega view not ready.');
                    }
                    const url = await view.toImageURL('png', window.devicePixelRatio);
                    if (requestPort) {
                      requestPort.postMessage({type: 'pngGenerated', url});
                    }
                  } catch (error) {
                    if (requestPort) {
                      requestPort.postMessage({type: 'pngError', error: error.message});
                    }
                  } finally {
                    if (requestPort) {
                      requestPort.close();
                    }
                  }
                }

                window.addEventListener('message', messageEvent => {
                  if(messageEvent.source !== window.parent ||
                    messageEvent.origin !== 'https://lookerstudio.google.com'){
                    return;
                  }
                  const requestPort = messageEvent.ports[0];
                  const {spec, fixedSpec, mainHeight, generateVegaPng} = messageEvent.data;

                  if (generateVegaPng) {
                    handleGenerateVegaPng(requestPort);
                  } else {
                    handleVegaEmbed(requestPort, spec, fixedSpec, mainHeight);
                  }
                });
                window.addEventListener('contextmenu', e => {
                  if (mainEventPort) {
                    mainEventPort.postMessage({
                      type: 'contextmenu',
                      clientX: e.clientX,
                      clientY: e.clientY,
                    });
                  }
                  e.preventDefault();
                });
                for (const eventType of ['mousedown', 'mouseup', 'mousemove']) {
                  window.addEventListener(eventType, e => {
                    if (mainEventPort) {
                      mainEventPort.postMessage({
                        type: 'mouse',
                        eventType,
                        clientX: e.clientX,
                        clientY: e.clientY,
                        movementX: e.movementX,
                        movementY: e.movementY,
                        buttons: e.buttons,
                        detail: e.detail,
                        altKey: e.altKey,
                        ctrlKey: e.ctrlKey,
                        shiftKey: e.shiftKey,
                      });
                    }
                  });
                }
                for (const eventType of ['keydown', 'keyup', 'keypress']) {
                  window.addEventListener(eventType, e => {
                    if (mainEventPort) {
                      mainEventPort.postMessage({
                        type: 'key',
                        eventType,
                        altKey: e.altKey,
                        code: e.code,
                        ctrlKey: e.ctrlKey,
                        isComposing: e.isComposing,
                        key: e.key,
                        location: e.location,
                        metaKey: e.metaKey,
                        repeat: e.repeat,
                        shiftKey: e.shiftKey,
                      });
                    }
                  });
                }
                window.addEventListener('unload', () => {
                  if (mainEventPort) {
                    mainEventPort.postMessage({type: 'unload'});
                  }
                });
              </script>
            </body></html>
