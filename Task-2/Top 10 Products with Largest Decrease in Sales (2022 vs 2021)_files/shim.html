                function handleVegaEmbed(requestPort, spec, fixedSpec, mainHeight) {
                  mainEventPort = requestPort;
                  const tooltip = (handler, mouseEvent, item, value) => {
                    if (mainEventPort) {
                      mainEventPort.postMessage({
                        type: 'tooltip',
                        value,
                        bounds: item._svg.getBoundingClientRect(),
                      });
                    }
                  };

                  const vegaOptions = {
                    mode: 'vega',
                    ast: true,
                    actions: false,
                    renderer: 'svg',
                    tooltip,
                  };
                  currentVegaViewPromise = vegaEmbed('#target', spec, vegaOptions).then(({view}) => {
                      
        view.addSignalListener('select', (signal, datum) => {
          if (mainEventPort) {
            mainEventPort.postMessage({
              type: 'signal',
              signal: 'select',
              datum,
            });
          }
        });
      
        view.addSignalListener('multiselect', (signal, datum) => {
          if (mainEventPort) {
            mainEventPort.postMessage({
              type: 'signal',
              signal: 'multiselect',
              datum,
            });
          }
        });
      
        view.addSignalListener('brushSelect', (signal, datum) => {
          if (mainEventPort) {
            mainEventPort.postMessage({
              type: 'signal',
              signal: 'brushSelect',
              datum,
            });
          }
        });
      
        view.addSignalListener('brushMultiselect', (signal, datum) => {
          if (mainEventPort) {
            mainEventPort.postMessage({
              type: 'signal',
              signal: 'brushMultiselect',
              datum,
            });
          }
        });
      
        view.addSignalListener('zoomX', (signal, datum) => {
          if (mainEventPort) {
            mainEventPort.postMessage({
              type: 'signal',
              signal: 'zoomX',
              datum,
            });
          }
        });
      
        view.addSignalListener('zoomDualY', (signal, datum) => {
          if (mainEventPort) {
            mainEventPort.postMessage({
              type: 'signal',
              signal: 'zoomDualY',
              datum,
            });
          }
        });
      
        view.addSignalListener('zoomY', (signal, datum) => {
          if (mainEventPort) {
            mainEventPort.postMessage({
              type: 'signal',
              signal: 'zoomY',
              datum,
            });
          }
        });
      
        view.addSignalListener('viewportX', (signal, datum) => {
          if (mainEventPort) {
            mainEventPort.postMessage({
              type: 'signal',
              signal: 'viewportX',
              datum,
            });
          }
        });
      
        view.addSignalListener('viewportDualY', (signal, datum) => {
          if (mainEventPort) {
            mainEventPort.postMessage({
              type: 'signal',
              signal: 'viewportDualY',
              datum,
            });
          }
        });
      
        view.addSignalListener('viewportY', (signal, datum) => {
          if (mainEventPort) {
            mainEventPort.postMessage({
              type: 'signal',
              signal: 'viewportY',
              datum,
            });
          }
        });
      
                      if (mainEventPort) {
                        mainEventPort.postMessage({type: 'ready'});
                      }
                      return view;
                  });

                  const mainSection = document.querySelector('#target');
                  const fixedSection = document.querySelector('#fixed');
                  if (fixedSpec) {
                    mainSection.style.overflowY =
                      spec.height - mainHeight < 2 ? 'hidden' : 'auto';
                    mainSection.style.overflowX = 'hidden';
                    mainSection.style.width = '100%';
                    mainSection.style.height = mainHeight + 'px';
                    fixedSpec.config = spec.config;
                    fixedSpec.data = spec.data;
                    fixedSpec.padding = spec.padding;
                    vegaEmbed('#fixed', fixedSpec, vegaOptions);
                  } else {
                    mainSection.style.overflowY = null;
                    mainSection.style.overflowX = null;
                    mainSection.style.width = null;
                    mainSection.style.height = null;
                    fixedSection.innerHTML = '';
                  }
                }

                async function handleGenerateVegaPng(requestPort) {
                  try {
                    const view = await currentVegaViewPromise;
                    if (!view) {
                      throw new Error('Cannot generate image: Vega view not ready.');
                    }
                    const url = await view.toImageURL('png', window.devicePixelRatio);
                    if (requestPort) {
                      requestPort.postMessage({type: 'pngGenerated', url});
                    }
                  } catch (error) {
                    if (requestPort) {
                      requestPort.postMessage({type: 'pngError', error: error.message});
                    }
                  } finally {
                    if (requestPort) {
                      requestPort.close();
                    }
                  }
                }

                window.addEventListener('message', messageEvent => {
                  if(messageEvent.source !== window.parent ||
                    messageEvent.origin !== 'https://lookerstudio.google.com'){
                    return;
                  }
                  const requestPort = messageEvent.ports[0];
                  const {spec, fixedSpec, mainHeight, generateVegaPng} = messageEvent.data;

                  if (generateVegaPng) {
                    handleGenerateVegaPng(requestPort);
                  } else {
                    handleVegaEmbed(requestPort, spec, fixedSpec, mainHeight);
                  }
                });
                window.addEventListener('contextmenu', e => {
                  if (mainEventPort) {
                    mainEventPort.postMessage({
                      type: 'contextmenu',
                      clientX: e.clientX,
                      clientY: e.clientY,
                    });
                  }
                  e.preventDefault();
                });
                for (const eventType of ['mousedown', 'mouseup', 'mousemove']) {
                  window.addEventListener(eventType, e => {
                    if (mainEventPort) {
                      mainEventPort.postMessage({
                        type: 'mouse',
                        eventType,
                        clientX: e.clientX,
                        clientY: e.clientY,
                        movementX: e.movementX,
                        movementY: e.movementY,
                        buttons: e.buttons,
                        detail: e.detail,
                        altKey: e.altKey,
                        ctrlKey: e.ctrlKey,
                        shiftKey: e.shiftKey,
                      });
                    }
                  });
                }
                for (const eventType of ['keydown', 'keyup', 'keypress']) {
                  window.addEventListener(eventType, e => {
                    if (mainEventPort) {
                      mainEventPort.postMessage({
                        type: 'key',
                        eventType,
                        altKey: e.altKey,
                        code: e.code,
                        ctrlKey: e.ctrlKey,
                        isComposing: e.isComposing,
                        key: e.key,
                        location: e.location,
                        metaKey: e.metaKey,
                        repeat: e.repeat,
                        shiftKey: e.shiftKey,
                      });
                    }
                  });
                }
                window.addEventListener('unload', () => {
                  if (mainEventPort) {
                    mainEventPort.postMessage({type: 'unload'});
                  }
                });
              </script>
            </body></html>
